services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-etterz/ts_budget}/frontend:latest
    depends_on:
      - backend
    environment:
      - PORT=${PORT:-3000}
    network_mode: host
    restart: unless-stopped

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-etterz/ts_budget}/backend:latest
    volumes:
      - budget_db:/app/data
    environment:
      - DB_PATH=/app/data/budget.db
      - CORS_ORIGINS=${CORS_ORIGINS:-https://budget.yourdomain.com}
    network_mode: host
    restart: unless-stopped

volumes:
  budget_db:
    driver: local
