services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-etterz/ts-budget}/frontend:latest
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - app_net
    restart: unless-stopped

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-etterz/ts-budget}/backend:latest
    volumes:
      - budget_db:/app/data
    environment:
      - DB_PATH=/app/data/budget.db
      - CORS_ORIGINS=${CORS_ORIGINS:-https://budget.yourdomain.com}
    networks:
      - app_net
    restart: unless-stopped

volumes:
  budget_db:
    driver: local

networks:
  app_net:
    driver: bridge
    internal: true
